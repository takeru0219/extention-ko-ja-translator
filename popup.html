<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 200px;
      padding: 10px;
      font-family: sans-serif;
    }
    button {
      width: 100%;
      padding: 8px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #357ae8;
    }
    .settings-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      color: #666;
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }
    .settings-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <button id="translateBtn">Translate Page</button>
  <a href="#" id="openSettings" class="settings-link">Settings</a>
  <script src="popup.js"></script>
</body>
</html>
