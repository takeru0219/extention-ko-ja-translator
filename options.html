<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Korean Translator Settings</title>
  <style>
    body {
      padding: 20px;
      font-family: sans-serif;
      max-width: 400px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 8px 16px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #357ae8;
    }
    #status {
      margin-top: 10px;
      color: green;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Settings</h2>
  <div class="form-group">
    <label for="apiKey">Gemini API Key</label>
    <input type="text" id="apiKey" placeholder="Enter your API Key">
  </div>
  <div class="form-group">
    <label for="modelName">Model Name</label>
    <input type="text" id="modelName" placeholder="gemini-3.1-flash-lite" value="gemini-3.1-flash-lite">
  </div>
  <div class="form-group">
    <label for="maxBatchSize">Max Elements per Request</label>
    <input type="number" id="maxBatchSize" placeholder="250" value="250" min="1">
  </div>
  <div class="form-group">
    <label for="maxBatchChars">Max Characters per Request</label>
    <input type="number" id="maxBatchChars" placeholder="30000" value="30000" min="1">
  </div>
  <button id="saveBtn">Save</button>
  <div id="status">Settings saved.</div>
  <script src="options.js"></script>
</body>
</html>
